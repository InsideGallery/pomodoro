id: io.github.InsideGallery.Pomodoro
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: pomodoro

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-config/pomodoro:create

build-options:
  append-path: /usr/lib/sdk/golang/bin
  env:
    GOPATH: /run/build/pomodoro/go
    GOFLAGS: -mod=vendor

modules:
  - name: libdbusmenu
    buildsystem: autotools
    config-opts:
      - --with-gtk=3
      - --disable-dumper
      - --disable-static
      - --disable-tests
      - --disable-gtk-doc
      - --enable-introspection=no
      - --disable-vala
    build-options:
      cflags: -Wno-error
      env:
        HAVE_VALGRIND_FALSE: '#'
        HAVE_VALGRIND_TRUE: ''
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: libayatana-ido
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/ayatana-ido.git
        tag: 0.10.4

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-indicator.git
        tag: 0.9.4

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
      - -DENABLE_GTKDOC=NO
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-appindicator.git
        tag: 0.5.93

  - name: pomodoro
    buildsystem: simple
    build-commands:
      - |
        for f in vendor-dl/*/; do true; done
        go mod vendor
        cp -r vendor-dl/*/* vendor/ 2>/dev/null || true
      - go build -ldflags="-s -w" -o pomodoro ./cmd/pomodoro/
      - install -Dm755 pomodoro /app/bin/pomodoro
      - |
        sed -e 's/^Icon=pomodoro$/Icon=io.github.InsideGallery.Pomodoro/' \
          packaging/pomodoro.desktop > pomodoro-flatpak.desktop
        install -Dm644 pomodoro-flatpak.desktop /app/share/applications/io.github.InsideGallery.Pomodoro.desktop
      - install -Dm644 packaging/io.github.InsideGallery.Pomodoro.metainfo.xml /app/share/metainfo/io.github.InsideGallery.Pomodoro.metainfo.xml
      - install -Dm644 packaging/pomodoro.png /app/share/icons/hicolor/256x256/apps/io.github.InsideGallery.Pomodoro.png
    sources:
      - type: git
        url: https://github.com/InsideGallery/pomodoro.git
        tag: v1.0.7
      - go-modules.json
