profile: coverage.out

threshold:
  file: 0
  package: 0
  total: 70

exclude:
  paths:
    - \.pb\.go$
    - ^services/.*/cmd/
    - ^services/.*/internal/.*/scene\.go$
    - ^services/.*/internal/.*/systems/
    - ^services/.*/internal/audio/
    - ^services/.*/internal/builtin/
    - ^services/.*/internal/tray/
    - ^pkg/app/
    - ^pkg/systems/
    - ^pkg/pluggable/
    - ^pkg/platform/
    - ^pkg/ui/
    - ^pkg/ecs/
    - ^pkg/resources/
    - pkg/plugins/.*/scene\.go$
    - pkg/plugins/.*/desktop\.go$
    - pkg/plugins/.*/loading\.go$
    - pkg/plugins/.*/puzzle\.go$
    - pkg/plugins/.*/cutter\.go$
    - pkg/plugins/.*/plugin\.go$

breakdown-file-name: ''

diff:
  base-breakdown-file-name: ''
