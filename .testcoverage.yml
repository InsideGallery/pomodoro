profile: coverage.out

threshold:
  file: 0
  package: 0
  total: 70

exclude:
  paths:
    - \.pb\.go$
    - ^cmd/
    - ^internal/app/
    - ^internal/audio/
    - ^internal/builtin/
    - ^internal/tray/
    - ^internal/ecs/
    - internal/modules/.*/scene\.go$
    - internal/modules/.*/systems/
    - ^pkg/systems/
    - ^pkg/pluggable/
    - ^pkg/platform/
    - ^pkg/ui/
    - pkg/plugins/.*/scene\.go$

breakdown-file-name: ''

diff:
  base-breakdown-file-name: ''
