name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libasound2-dev libayatana-appindicator3-dev libxxf86vm-dev
      - name: Build AppImage
        run: make appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-linux-amd64
          path: build/*.AppImage

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build arm64 binary in container
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}":/src -w /src \
            -e VERSION="$VERSION" \
            golang:1.25-bookworm sh -c '
              apt-get update &&
              apt-get install -y libx11-dev libgl1-mesa-dev libxcursor-dev libxrandr-dev \
                libxinerama-dev libxi-dev libasound2-dev libayatana-appindicator3-dev libxxf86vm-dev &&
              go build -ldflags "-s -w -X main.version=$VERSION" -o build/pomodoro ./cmd/pomodoro/ &&
              tar czf "build/pomodoro-${VERSION}-linux-arm64.tar.gz" -C build pomodoro
            '
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-linux-arm64
          path: build/*.tar.gz

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -H windowsgui -X main.version=$VERSION" -o "build/pomodoro-${VERSION}-windows-amd64.exe" ./cmd/pomodoro/
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-windows-amd64
          path: build/*.exe

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build
        shell: bash
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -H windowsgui -X main.version=$VERSION" -o "build/pomodoro-${VERSION}-windows-arm64.exe" ./cmd/pomodoro/
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-windows-arm64
          path: build/*.exe

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=$VERSION" -o build/pomodoro ./cmd/pomodoro/
          tar czf "build/pomodoro-${VERSION}-darwin-arm64.tar.gz" -C build pomodoro
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-darwin-arm64
          path: build/*.tar.gz

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -X main.version=$VERSION" -o build/pomodoro ./cmd/pomodoro/
          tar czf "build/pomodoro-${VERSION}-darwin-amd64.tar.gz" -C build pomodoro
      - uses: actions/upload-artifact@v4
        with:
          name: pomodoro-darwin-amd64
          path: build/*.tar.gz

  release:
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-windows-amd64
      - build-windows-arm64
      - build-darwin-arm64
      - build-darwin-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
